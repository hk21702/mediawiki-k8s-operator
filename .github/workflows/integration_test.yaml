name: Integration tests

on:
  pull_request:
  schedule:
    - cron: "0 15 * * SAT"

jobs:
  integration-tests-juju-3:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    with:
      load-test-enabled: false
      load-test-run-args: "-e LOAD_TEST_HOST=localhost"
      trivy-fs-enabled: false
      trivy-image-config: "trivy.yaml"
      self-hosted-runner: true
      self-hosted-runner-label: "edge"
      juju-channel: "3/stable"
      channel: "1.35-strict/stable"
      microk8s-addons: "dns ingress rbac storage metallb:10.64.140.43-10.64.140.49"
      modules: '["test_charm", "test_oauth"]'
      with-uv: true
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    if: false # The MySQL-K8s charm does not support Juju 4 yet
    with:
      load-test-enabled: false
      load-test-run-args: "-e LOAD_TEST_HOST=localhost"
      trivy-fs-enabled: true
      trivy-image-config: "trivy.yaml"
      self-hosted-runner: true
      self-hosted-runner-label: "edge"
      juju-channel: "4/stable"
      channel: "1.35-strict/stable"
      modules: '["test_charm", "test_oauth"]'
      with-uv: true
  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs:
      - integration-tests-juju-3
      - integration-tests
    uses: canonical/operator-workflows/.github/workflows/allure_report.yaml@main
